body:
  text: 喉風案質本陰虛涵濡少上承之用感由秋燥清肅失下降之權邪實正虛恐愈傷而愈損陰虛陽旺必化火而化痰風趁火勢而益張痰因火蒸而上擾蘊結肺胃之經釀成喉風之候身倏寒而倏熱火勢鴟張咽忽阻而忽疼毒邪蜂起上壅呼吸之門竊恐餉糧不濟內阻飲食之路還虞庚癸頻呼痰嘶氣逆天氣之開泄失司溲澀便難地道之通調失職火炎則土燥口隨飲而隨干火盛則水虧齒或焦而或垢猶是燎原之火撲滅難圖幾同久旱之苗枯憔安保脈弦數而未得沖和相火有升騰之象舌光絳而又兼燥刺陰津有立涸之虞邪乘虛而內陷無殊社鼠城狐正幾敗而難持豈等杯蛇市虎於此存一線之危而要出萬全之計不啻鰲載之重抑同弋獲之期將投以辛溫乎乃是抱薪救火抑濟以輕清乎亦同杯水車薪竟委窮源隨症施治必得瀉離位之丙丁救坎宮之壬癸庶可汲西江之水以滋乾涸之魚聊著病情於前並附藥方於後淺見如是尊識若何香犀尖八分元參四錢鮮石斛五錢陳金汁二兩西洋參一錢五分鮮生地一兩甘草五分全瓜蔞三錢西黃一分連翹三錢川貝母三錢銀花四錢丹皮二錢川雅連八分喉蛾案素來陰分不足熱邪內蘊近感風溫引動伏邪鬱蒸化火火升而為痰痰火上攻逆於肺胃之脈遂成喉蛾之症幾經旬日仍然咽喉紅腫甚致湯水難下項外微腫夫咽喉為一身之總要百脈之關頭又為呼吸之門戶飲食之道路方寸之地所關甚大幸而痰來且爽陰液未涸猶可無虞按脈洪數帶弦舌苔邊紅根膩究系邪踞肺胃為多而未至於心營拙擬辛涼清解佐以消痰一法冀其邪有退避三舍之勢庶無他變之理否則願夫子明以教我犀角尖銀花薄荷天竺黃黃芩竹芯鮮生地丹皮元參牛蒡子花粉復診前擬清火消痰之劑諸症仍不退舍究系邪勢鴟張如火之始燃難攖其勢也況體熱不涼有邪伏陽明之象痰多且膩是熱留太陰之徵咽喉紅而且腫熱邪兼挾毒邪脈息數而帶弦風火引動鬱火經云火者痰之本痰者火之標痰火盤踞圖治不易驟寒則邪鬱而內潰過散則火焰而腐增先散後潰洵屬至理邇來大便旬不更衣項旁腫痛上引頭額顯系火性上炎風性善竄故也風駕火威火乘風勢風火相煽是以擾攘無休也既承雅招不棄鄙陋勉爾揮汗撰方以為蝦力行舟之助耳羚羊角大力子元參馬勃川貝連翹鮮石斛粉丹皮竹心花粉知母三診喉蛾已潰毒邪有外泄之機腫勢漸消痰火無稽留之患惟喉旁尚有硬塊大便堅結脈息細數帶弦舌質微紅尖絳此陰液受傷也而肺胃之熱究屬有餘未淨也斯時養陰清熱以救津液勢所必需而腸胃以通為用養胃潤腸亦不得不兼顧之若驟進滋膩猶恐餘燼復燃余焰復騰合當與否侯尊丈裁之扁金斛川貝知母秫米瓜蔞仁銀花西洋參純鉤穀芽花粉粉丹皮連翹頸癰案體素陰虛血少流行之用時逢金旺木失暢達之機因感風熱遂化火而化痰阻痹少陽致傷營而傷衛逗留肌肉之間釀成頸癰之候症起未經一候瘡形已腫四圍外倏寒而倏熱營衛之調和失職身時疼而時痛經絡之灌溉無權腫見焮紅漸顯釀膿之象根形散蔓未得托毒之徵脈來細數帶弦風火兼挾相火舌色微黃近燥熱邪蒸化毒邪口渴胃呆癸水虧而陽土嫌燥痰稠咳逆甲木旺而陰金受傷治宜辛涼清解泄熱即所以保陰佐以頂托透邪攘外即所以安內既承雅招不棄淺陋非敢說夢聊以解嘲鮮生地五錢元參三錢丹皮二錢赤芍一錢半川連五分薄荷一錢半連翹三錢牛蒡子三錢川貝二錢桔梗五分骨槽風案齒乃腎之餘齦屬胃之脈想骨槽風之症邪深著骨每多成漏之虞良由元本不足腎水素虧外束風邪襲入陽明胃絡乘虛而邪伏於骨醞釀而成據述症起二月先自內潰後復外穿潰後膿穢難淨牙床骨露甚至積成膿骨內外腫勢未能全消此係正不託邪邪蘊難清之故症源彌深勢恐難以奏效所幸者飲食如故胃未受傷中氣尚能扶持茲擬標本兼顧緩緩圖之西洋參連翹扁金斛赤白芍知母福瀉淨銀花米仁新會皮粉丹皮元參鵝掌風案體素陰虛血少循環之職感由風燥營無灌溉之權陰虛則生熱蒸動花柳之梅毒由筋骨而外達皮膚遂成鵝掌風之候現形肌肉麻木阻痹無形之氣皮膚燥裂致傷有形之血近日來破津黃水略兼癢痛良由陰虛內劫鼓動花柳之餘毒熏蒸外達使然診脈澀而少力舌尖紅而苔黃營陰所以受傷即衛陽亦未能滋養經云陰虛生內熱陽虛惡外寒寒熱不調乃陰陽二虧之候症屬根深非但難以速效且恐由虛成損有意外之憂茲擬調氣養營顧本治主以冀一元來復庶期佳徵制香附天花粉銀花粉丹皮川芎藭西洋參東白芍生甘草歸身大生地白蘚皮雞血藤膠癧核案手背凍瘡屢發顯系血因寒滯營氣失調夫血脈營衛周流不休寒氣客於經絡之中則血泣血泣則不通不通則衛氣歸之不得返故手背癧核累累疊起延及肩臂經云癰疽者寒氣之所變也又云寒傷形形傷則腫考厥病源的系寒凝而致但六淫之邪皆從火化由火化毒蘊釀成膿致癧核次第穿潰潰出敗漿可見元本不足氣血兩虧想無形而痛者其陽完而陰傷之有形而痛者其陰完而陽傷之乃既手背胖腫膿多穢濁筋骨作疼有形而且痛陰陽兩傷正虛則邪不能托毒蘊難宣如有城狐社鼠之可患毒邪久擾山筋而傷及於骨血枯髓涸致筋骨肌肉不相營養經脈敗漏熏於五臟脾胃主肌肉形羸體瘦中氣未始無傷肝藏血腎藏精有形精血既虧肝腎安保無恙乎經云肝腎同位乙癸同源水虧不能涵木土虛不能御木木失榮養肝火不平勢必升騰無制犯胃則嘔吐痰涎乘脾則腹脹欠運雖未至謝谷廢納而所進水穀之精養義未能化津化液徒釀痰濁邪氣日益擾攘正氣日益消磨正所謂邪氣勝者精氣衰也現診脈象細弦重按少力舌苔黃薄帶灰質紅起刺此由陽而傷及於陰由外而傷及於內久虛不復防有成損之虞據愚見陰陽並補扶正以卻邪譬如君子盈庭則小人退而無位矣慎弗專圖外治而冀速效竊恐劍關苦拒而陰平非復漢有也拙擬候清眼裁政為是吉林參於術陳皮杜仲茯神上綿耆大熟地半夏歸身甘草白芍驢皮膠外吹案乳房乃陽明所屬乳頭乃厥陰所居夫陽明胃也厥陰肝也肝失暢達乳絡因而壅塞胃乏沖和肌肉從此疏豁豁則口熱易入壅則營氣不從膠固不宣鬱蒸化毒此外吹之所由成也初起如粟漸大如瓜輕按則木硬應手重按則痛楚難鳴看腫勢而驚心非比冰山之易解睹紅形而觸日豈同螢火之無憂身倏寒而倏熱有火伏陽明之狀經適來而適斷有熱入血室之徵腫勢漸增乳絡愈形壅塞飲食較減倉廩又顯困呆據述症起旬日醫更數人投消散而無功進頂托而罔效脈象細而兼數舌苔膩而且黃挹脈察舌憑症擬方治宜甘涼清解泄熱即所以保陰佐以頂托透邪攘外即所以安內聊出數語並附一方理之是否還望高明採奪全瓜蔞純鉤淡條芩陳皮甲片元參金石斛知母牛蒡子角刺連翹銀花案產後血液虧損肝經失其榮養肝為將軍之官其性甚急一有不調勢必化火犯胃陽明脈絡亦從而阻遏是以左乳木硬紅腫致成外吹之症潰經半月有餘仍然膿水連綿根腳腫硬脈息細數帶弦左關更甚舌色淡紅苔薄中間微黃身熱納少頭眩耳鳴種種症情皆由營陰未復肝胃邪熱究屬有餘未盡也圖治之法豈可偏廢乎若徒進苦寒解毒非惟外瘍無益且恐胃氣受傷驟投滋膩養陰不特餘熱難清且憂餘燼復然姑擬調和肝胃參入養營解毒一法冀其餘邪盡化肝胃漸和再商救本窮源之法理之是否候諸翁裁之東洋參茯神佛手生穀芽白芍陳皮炒歸身粉丹皮杭菊金石斛首烏腎俞虛痰案先天不足少陰失封蟄之司寒濕深沉命門無內融之力毒阻腎俞小啻城狐社鼠投治非法無殊市虎杯蛇㗖夫人之氣血如天地之循環不已今為寒濕所阻經脈壅塞營氣不從遂成腎俞虛痰之候穿潰以來已經月餘依然清水連綿宛若漏卮之難塞形容癟瘦幾同枯木之無榮想七節之旁原是腎經之道路蓋腎為性命根本藏精藏氣藏神又為先天真陽育女育男育壽生生不已化化無窮多由此而致也乃今漏泄已久不特技巧難出而肝木亦失其湧濡經云肝木亦腎同位乙癸同源腎水既虧肝木安得無恙平邇來兩足屈而不伸時有氣衝之象則木失榮養已露其端倪雖胃氣尚未全敗中陽猶可支持而源遠根深圖治甚難若過投辛熱深恐陰液愈耗徒進寒涼更慮元陽驟脫今將投甘溫扶正者乎抑以甘寒育陰者耶靜坐以思必須陰陽並補參入精血有情之品或可汲西江之水聊滋乾涸之魚耳理之是否候高明採奪高麗參大熟地制首烏厚杜仲白歸身淮山藥女貞子潼蒺藜紫河車菟絲子淡蓯蓉枸杞子上熬膏再用龜鹿二仙膠案年近六旬陽氣日就虧損陽虛者濕必勝濕邪久踞氣血為之壅遏遂成腎俞發之候症起未經旬日而根盤幾同覆碗木硬隱痛皮色如常脈息細澀欠利舌苔淡白且膩間有寒熱種種症情總不外乎陽虛濕勝使然況平素惡寒喜暖聲發不揚下體時有痠痛濕盛陽浮已露端倪以脈參症深恐難以消散拙擬和陽利濕兼謂調氣血一法冀其移深居淺之意愚見如是未識當否東洋參杜仲潼蒺藜赤芍補骨脂淡蓯蓉生米仁木香炒歸身茯苓鹿角膠紫衣胡桃案大凡腎俞之症前賢議論不一或謂腎居至陰之地不可以陽症治之或曰先天之陽不可以陰證治之誰知陰中有陽陽中有陰陰陽懷抱兒同太極分而言之謂之陰陽合而言之謂之元氣元氣之分陰陽如太極之分兩儀故未有陰虛而陽無礙陽虛而陰無累矣不過有由陰虛而及於陽虛者有由陽虛而及於陰虛者也想尊翁自去年先見音低惡寒繼而腰痛內熱顯由陽虛而及於陰陰陽俱虛濕邪乘虛下注營氣不凋遂成斯症耳蓋腎俞為少陰本穴關係甚大此處生疽豈可不深慮乎幸而瘡形未見黑色高腫漸增將欲釀膿之象可無黴爛之虞姑仿陳遠公兩治散參入補托一法俾其速潰為要理之是否候琴翁裁之東洋參豨薟草防己白芍白朮當歸炙甲片生黃耆甘草茯苓銀花杜仲龜鹿二仙膠方用人參以為君大舉一身之陽取杜仲以為臣專利二腎之氣佐歸芍以鹽炒即能守命門真陰使苓薟得防己便可驅腎宮濕熱甲片共黃耆托邪甚速銀花同甘草解毒最純庶幾陽無偏勝之虞邪正有解紛之妙更用龜鹿二仙以有情生有形也發背案發背之膿已化多而且稠根盤活而收束可無內陷橫流之慮矣蓋膿已化則痛自漸減腐亦不盛究系凝滯之邪已得外泄之機惟飲食少思大便不爽則腸胃津液暗受其傷若過用清苦解毒深恐劍關苦拒而陰平非復漢有也驟近救本窮源慮其餘燼復焰而津液更受其傷姑擬清營一法徐候其液復邪淨則腸胃自和而外瘍亦緩緩向愈耳金石斛蓮子丹皮綠豆衣知母青鹽皮銀花元參穀芽西洋參鉤鉤湯火傷案燎原之火本不可向茲因失火焚山肆橫無制當局者能無憂危之心哉憂心一起竟忘生死之關強絕其源被火燃傷焦頭爛額原屬好肉做瘡本無內症但邇來增寒壯熱大便秘結脈息沉數帶弦舌色尖紅中焦間有神昏想胃主肌肉肺主皮毛邪傷肌表肺胃內應是以兼有咳嗽氣急口渴煩悶等症經云火盛生風風駕火威火乘風勢風火相煽深恐內竄心營姑擬清營解毒兼通地道一法冀其釜底抽薪庶免內陷之虞犀角尖生軍粉丹皮玄參上西黃鮮生地銀花連翹淡芩竹卷芯爛皮疔案性本操勞陽氣先衰於平素端由火毒陰津復損於當時夫人之氣血周流不息茲為毒邪所害難免腐爛之虞是以有爛皮疔之患也症起未經旬日而瘡形已有尺余此處屬陽明之脈陽邪攻於陽經即所謂兩陽相灼矣故其爛可立而待也脈浮洪而且數邪勢方張舌焦黑而尖紅營陰幾劫身熱口渴譫語神昏皆由是而蜂起勢已重極危險無疑而圖治之法最難恰當況用藥如用兵得則其兵也不得則其寇也若投輕清解毒無殊杯水車薪妄用辛熱驅邪不啻抱薪救火必得大劑清營解毒以為背城借一之計暹犀尖二兩西黃五分京元參六錢鮮生地二兩淨銀花八錢安宮牛黃丸二粒偏腦疽案疽名偏腦原是火毒之瘍經屬膀胱曾為寒水之腑夫腦疽一症有內因外因之異有正輕偏重之殊由六淫外感者輕從五臟內發者重外感者多生於正中內發者每起於項旁疽生偏左非內因而何所謂內因而成者其源有五或由心緒煩擾煽動不寧以致火旺而沸騰行於項間與寒水交滯而成者或因惱怒傷肝項乃三陽統筋之所肝傷則血脈不朝筋失榮養凝滯為腫而成者亦有思慮傷脾脾傷則健運失職營氣不從逆於肉裡而成者又有恣欲傷腎腎傷則真陰之氣敗真陰一敗相火即生亦能致此仰屋圖維良由操勞過度加以情懷不暢則肝膽之火勃動於中逆於太陽之脈與內蘊濕邪熏蒸化毒遂成斯症耳迄今幾經二旬仍然木硬漫腫根腳色紫甚至漿水稀少間有噯氣脈息沉數少神舌苔淡白根膩以脈參症顯系正虛邪實一時不能托邪外達而然年尊得此深恐難以支持拙擬扶正卻邪標本兼顧一法冀其裂縫來漿根盤收束庶幾有安瀾之慶否則慮有意外之變拙見如是未識尊意若何別參鬚甲片銀花茯神陳皮甘草鮮佛手金石斛歸身丹皮蓮子黃耆穀芽綠豆衣二診前擬扶正卻邪之劑痛勢稍緩漿水漸來似乎有見松之象但根腳猶硬毒邪有盤踞之徵新腐未分元氣少流行之用正虛邪滯非已露其端倪乎大凡外症正重偏輕獨有腦疽正輕偏重嘗閱吳鞠通論云正屬督脈督脈為純陽之經起於尾閭貫脊而上毒氣乘之每能外達故高腫易腐為易治之症也偏屬太陽太陽為寒水之腑始於晴明夾項而下邪氣客之最易內侵故平塌難腐為難治之症也況七旬之高年困一月之大患末學淺陋而欲借著代籌計出萬全不啻鰲戴之重矣而干旋之法最難洽當使徒進苦寒恐犯虛虛之戒而專投滋膩難免實實之憂茲擬此方必欲兩不相害或可挽扶中流之砥柱挽既倒之狂瀾是以聊釋症情於前雜配藥方於後然歟否歟請君政之高麗參炒歸身淨銀花粉丹皮生黃耆金扁斛生甘草生穀芽新會皮茯苓佛手蓮子三診膿水雖多而瘡頭塌陷紅腫蔓延脈息右部少神左關弦數究系近增鬱怒肝火妄動挾毒肆橫之故古稀患此豈可不深慮乎夫人之體有虛亦有實以言乎高年其實也與哉其虛也虛則精神日餒元氣就衰使治匪根源不啻杯蛇市虎抑症有輕亦有重以念夫偏腦疽其輕也與哉其重也重則毒邪逗留糾纏不已覺邪踞經絡無殊社鼠城狐假令邪實而正未虧猶可用三黃解毒以衰其勢也何慮乎毒邪鴟張而擾攘無休耶假令正虛而邪已淨便可投十全大補以扶其本也何慮乎元氣虧損而流行不健耶兼之傳道之官恆固守庚金不及生扶而倉廩之令有專權戊土卻能化育不然則中流乏砥柱坐鎮將何所恃而不恐高麗參八分純鉤鉤四錢丹皮一錢半秫米一錢半甘菊一錢半生綿耆三錢霍石斛四錢茯神四錢歸身四錢麻仁二錢淨銀花三錢白芍三錢生甘草一錢穀芽三錢案質本豐腴濕邪逗留可見性情急迫鬱火內蘊無疑況節屆天中正當陽氣大泄濕熱升騰之候偶感時邪引動蘊蓄之濕化火毒逆於太陽之脈致令升降失調遂成偏腦疽之症蓋瘡頭塌陷毒邪開盤踞之端根腳旁流火毒有肆橫之兆四肢清冷陽虛而表不固也五志昏蒙邪盛而神無依也症既如是安能無內陷外脫之虞哉如其不陷則君主靈明心神內守焉能有神昏妄語安有自汗肢冷之症歟以七旬之高年困一月之大患何堪支持末學淺陋而欲藉箸代籌計出萬全不啻鰲戴之重矣但死生雖有天命醫治聊盡人工勉擬方以冀萬一臺參大有耆炙甲片淨銀花白芍石菖蒲粉丹皮辰茯神人參至寶丹附骨疽案症起多年顯系沉寒之疾疽名附骨原是痼冷之邪背如鱉背督脈已露其虛端倪胸若雞胸仟脈自形其損象脈息虛而少神先天已經告憊飲食少而欠運後天未常非虧形羸肉削由於元氣之難榮膝屈筋傷不外營陰之失養膿水連綿宛若漏卮之難塞皮膚枯槁幾同敗鼓之無修邪踞筋骨無殊社鼠城狐病入膏肓誰曰杯蛇市虎深察症情不獨身軀生廢參究脈理且恐性命難全拙擬固本之方聊為延年之計高麗參五錢於術一錢半淡蓯蓉三錢綿耆四錢杜仲四錢大熟地四錢歸身四錢制首烏三錢杞子三錢穀芽三錢龜鹿二仙膠一兩案據述病情自去年七月間左股先覺隱痛不紅不熱皮色如常延至冬底穿潰膿水清而且多靜思其故顯系寒濕深伏筋骨致成附骨疽之候穿潰以來屈指已經半載仍然膿水連綿瘡口細小形羸肉削飲食少思按得脈息細數少神舌色淡白夫細為氣虛數為血虛舌苔白中氣已憊矣症情一派虛象非補不宜拙擬調養氣血兼救胃陽一法東洋參淮山藥炒歸身大熟地砂仁炒青鹽皮炒於術炒穀芽炒白芍白茯苓炙甘草蓋聞附骨疽之症前賢論有數端或由露臥風冷寒濕深襲而成者或應房欲之後外邪乘虛而入者亦有浴後乘涼而致者又有勞傷瘀滯而成者以上數端皆由元氣不足而來想尊翁雖無臥露勞傷之患然風寒暑濕安能竟無稍受況形軀單薄顯屬先天不足飲食少思的系後天又虧先天陽氣在腎後天陽氣在脾脾主肌肉脾陽不振則肌肉失其流暢邪氣最易逗留腎主骨髓腎陽不充則骨髓不得宣通毒邪每易深伏現視症勢顯系膿毒內搏骨節是以久潰難斂也甚至患在一股而兩腿皆屈不伸良由膿水久潰血液受傷筋絡失其榮養而然仍從前策加減候鹿翁裁之東洋參穀芽杞子淮山藥白芍青鹽皮茯苓熟地炙甘草於術歸身龜鹿二仙膠下搭手案毒阻育門氣血之循環莫展邪壅脈絡太陽之道路難通無怪乎下搭手之所由生也根腳紅而兼紫毒邪開盤踞之端瘡頭硬兮且疼營氣有稽留之兆是以外則漿水稀少內則嘔惡煩冤前則溲溺赤熱後則地道不通表裡俱不宣暢邪熱無從開泄炎蒸不熄不但瘡口腐爛且恐有內竄之憂茲擬清解火毒兼通地道一法冀其毒邪漸退大便堪通庶無意外之變小川連紫地丁大力子粉丹皮清寧丸野菊花毛時菇連翹淨銀花茯苓黃芩上搭手案據述去春偏中以來左足臂俱不能用肌肉不仁痰多言蹇顯系不足下元痰火中絡之候至今春來復中之後左肩忽覺紅腫瘡頭延爛此是肝火挾痰上擾逆於太陽之脈阻遏營氣鬱蒸化毒遂成上搭手之候刻下腐肉雖脫而根腳仍然紫硬不覺疼痛脈息細數帶弦重按殊無神韻舌質光絳且干氣急自汗種種症情良由痰火久踞元氣愈虛而陰液愈損矣高年患此豈可不深慮乎即承雅招不棄鄙陋勉爾揮汗撰方冀其一陰得來復之機元氣有生振之兆庶無意外之變否則慮其虛脫高麗參銀花露知母元參生首烏金石斛黃耆川貝西洋參蓮子穀芽紅形已退毒邪有宣化之機新肉齊生氣血得流形之用脈和緩而且勻痰火亦似乎下降舌淡紅而潮潤胃津已得以上乘倉廩之令有專權戊土卻能化育傳道之恆未失守庚金尚得升扶惟寤寐少寧身軀仍難以轉側語言蹇滯手足猶不能舉提究系津液素虛加以痰火久擾膿漿大潰則虛者愈虛不能內濟心陽以安其宅外灌百脈以利機關也況元虛挾痰挾火之體圖治極難若過投降火消痰猶恐虛虛之戒驟進滋陰扶正且憂實實之候茲擬補而不滯之方冀其陽生陰長坎離既濟則心君泰然而百體從令矣即外瘍亦不期愈而自愈矣高麗參細生地生穀芽知母制首烏潼蒺藜宋半夏銀花川貝母甘草蓮子案體素陽虛濕邪內蘊平居勞碌鬱火恆多濕邪阻於太陽氣血之循環莫展火毒壅於脈絡營陰之灌溉失司火因濕而愈熾濕得火而更張濕火交結於肺俞疽名遂成上搭手據云症起未至一旬而瘡形已經數寸黑爛無休恐犯三陷之局紅霞散漫盡有肆橫之徵肌肉不仁正氣失流行之用漿稀水少膿毒開盤踞之端脈細數而帶弦虛火更兼實火身微寒而兼熱濕邪且挾風邪大患纏身頗為棘手雖未嘔惡神昏形其惡候而已見瘡平根散漸露凶端宜未雨而綢繆毋臨渴而掘井必得扶正卻邪標本兼顧庶乎漸臻康泰矣弟愚粗暗方書稍明藥性命含毫而施治勉濡筆而撰方愧拙陋之無能候高明以斧政生綿耆銀花鮮生地大力子梅花點舌丹生甘草丹皮炙甲片天花粉暹犀角翹心紫地丁毛時菇環跳疽案寒凝脈絡少陽之道路難通濕阻肌膜氣血之循環莫展寒邪乘氣血之窒礙盤踞筋骨氣血因寒邪之擾攘堵塞流行蓋六淫之邪皆從火化即內經所謂陰極生陽寒鬱為熱熱甚肉腐為膿此環跳疽之所由生也據述症情起自胎前潰於產後針潰以來屈指已經二月猶然膿水連綿無殊漏井形軀癟瘦宛若枯蔗甚至數孔相串轉側艱難況飲食少思中氣已經告憊翻覆不已餘邪猶未全消身熱脈弦由真陰之下竭耳鳴頭暈屬肝陽之上浮仰屋圖維良由產後營陰大耗加以膿水久潰則虛者愈虛而肝陽愈旺矣茲擬陰陽並補參入熄肝養胃一法俾既傷之津液緩緩回生使已敗之精神徐徐恢復庶幾其旋元吉否則慮其虛脫愚見如斯尊意若何高麗參一錢杜仲四錢熟地砂仁炒四錢炒白芍三錢制首烏三錢黃甘菊一錢半杞子一錢半歸身四錢生熟米仁各二錢炙甘草一錢抱茯神三錢佛手一錢半蓮子三錢生熟穀芽各二錢案體質向虧舊歲適逢妊娠則氣血愈虛血虛則涵養失令筋脈從此不舒氣虛則外衛不周寒濕因而侵襲內不得入於臟腑外不能越於皮毛凝於骨髓之間阻於少陽之脈致使營衛欠流行經絡都阻礙如土之堵水石之投泉積久不化致延成環跳疽之候迄今已越二月仍是膿水淋漓狀若漏卮之難塞根腳板硬猶是石硬之無情兼之瘡孔深遠時覺疼痛想此處系少陽之過脈蓋少陽相火內寄又為多氣少血之經經云氣有餘便是火火熾則痛血不足則肌肉難長故取效如斯之難也至於頭眩耳鳴肝陽有上僭之勢胃呆納減戊土乏沖和之權況乎身熱若潮陰分早顯其損象腰疼如折八脈已露其虛端按得脈象細數而少神夫細為氣虛數為血虛少神者元氣不足也舌苔淡而尖絳尖絳者津液已傷也症情如此難治何疑勉擬陰陽兩顧兼參清營養胃一法俾得陰陽有來復之兆胃氣復生振之權庶無意外之慮否則深恐鞭長莫及矣然歟否歟還望質諸高明高麗參大生地於術龜板杜仲純鉤鉤金石斛池菊歸身茯神生熟穀芽山藥蓮肉元參首烏方用首地以養陰又取參術以壯氣一陰不足賴元母以扶助八脈空虛藉歸龜以調劑欲肝陽之潛伏非鉤菊而不能期胃陰之上承無斛谷而難濟山藥甘濡腎弱所宜杜仲甘溫水虧當取媲茯神以定志寤寐自安配蓮肉以清心虛熱自能去略考十劑之方聊仿七方之意並方案統希教益缺盆疽案風溫外襲肌膚失周流之度痰火內蘊肺胃失清降之權脈洪數而帶弦火邪方熾苔老黃而尖絳陰液已傷是以咳嗽欠爽痰稠如膠雖已針潰而根腳仍然木硬甚至腫延胸脅焮紅疼痛寤寐不安間有神昏此係肺胃邪熱漸欲入營之象高年患此甚屬棘手姑擬大劑清營解毒兼化痰火一法以冀弋獲竹瀝大青葉上西黃鮮生地銀花丹皮鮮石斛暹犀尖天竺黃川貝花粉連翹心肛癰案體歸陽盛誠為松柏之資質本陰虛未得涵濡之用況乎權操國政地僻事繁條教所施悉本精神所注即使節性提躬怡情靜養猶懼不濟而復加以濕溫久擾則虛者愈虛余濕不能盡化注於會陰之間釀成肛癰之候起經兩月有餘仍蔑一毫之效根腳仍然木硬膿流狀若漏卮脈細數而帶弦肝陽失潛舌微黃而根膩濕熱未清想下焦為深遠之鄉藥力難至肛旁乃至陰之域氣血罕來此虛處患症不特難期速效抑且有成漏之慮幸而胃氣無傷中流猶可支持附驥蕪詞舜臣翁教政細生地生首烏茯苓東洋參粉丹皮淨銀花陳皮生米仁福瀉白朮甘草象牙屑案一診症起略有半年翻覆已經數次靜究其源總由正氣衰憊餘邪不宣化耳想肛旁屬太陽與少陰腎相為表裡蓋膀胱為聚濕之腑少陰乃藏精之臟此處生癰每多翻花況乎質本陰虛肝腎早失涵濡之用加以宵旰勤勞以綏安黎庶則虛者愈虛餘邪更難宣化矣是以瘡口不能痊愈時有頭暈氣衝之患按脈虛弱少神左關獨見弦象以脈參症日久根深於此而謂能驟愈者非也於此而謂莫能愈者亦非也必得大劑窮源固本陰陽並補而復深於涵養之功以冀氣機流暢精血兩充自克漸臻康泰矣複方呈政別直參大熟地滁菊炙甘草茯苓淡蓯蓉杜仲杞子野於術制首烏潼蒺藜歸身龜板膠二診前擬陰陽並補一法福體稍強新肌略長頭暈氣衝之患亦見漸平此乃正復邪退之兆也刻按脈息細數猶見少神左關仍留弦象細數者餘邪未淨也少神者元氣未充也帶弦者肝陽未熄也度勢揆情總不外勞心所致耳經云君火一動相火隨之二火頻升一水不能相濟耳虛體患此奏效最難非難以斂其瘡口以治其標實難以復其真陰以固其本也若夫徒進辛溫以補氣壯氣即以助火專投滋膩以養陰一陰不能自生必得陰陽並補庶乎陽生陰長而無偏勝之虞矣仍宗前策增損須臾更張未知有合於尊意否耶方憑熟地以為君術草參苓作大臣佐理芍歸同杞菊蓯膠又使性和平肺癰案肺主五臟之華蓋出聲音而澤逮皮膚又為百脈之朝宗通呼吸而權歸清肅若元氣自強皮毛固密縱有客邪安能內侵尤如暗室潛修陰液早傷於平素風塵勞瘁風溫復感於今時以致肺機不暢降令失權釀成肺癰之患於茲半月有餘蔑一毫之效痰涎漉漉咳嗽頻頻或膿或血時穢時腥中府時覺隱痛左臥常嘆不寧脈右大而左弦肝火有上升之兆舌微黃而尖絳肺津無下降之徵必須暢彼情懷濟以藥餌庶乎漸臻康泰矣第愚粗諳方書稍明藥性命含毫而施治勉濡筆而撰方愧拙陋之無能候尊翁以斧政旋覆花瓜蔞仁真滁菊粉丹皮叭杏仁川貝黛蛤散北沙參白荷花露枇杷露炒蘇子肥知母二診前進肅肺清金兼熄肝陽一法身熱稍和似有轉機之象但痰多氣急金府之右降失權肋痛頭眩肝垣之左升太過脈左弦而右大邪熱未平舌邊絳而中黃陰液暗損假令胃陽受傷子母少相生之力大便溏泄表裡無相助之能幸而倉廩之令有專權戊土恰能化育傳道之官恆固守庚金尚得升扶據云夜寐少寧此非胃不和而臥不安之理良由肝陽之未靜肺火之難清耳內經云肝熱則魂不歸舍肺熱則魄不歸藏即此之謂也面帶萎黃濕邪未化口不燥渴蓄飲內留仍清肅太陰以冀餘邪之宣化加以安舒靜養可望肝火之漸平非敢說夢聊以解嘲西洋參知母枇杷露杏仁瓜蔞仁旋覆花玉竹驢皮膠麥冬滁菊花流注案足跟瘙癢流注結痂迄今寒暑幾更依然翻覆再四究厥病源良由步走過度氣血違和兼挾陽蹻風濕留阻致發漫綿瘡之候時延已久難期速效拙擬一方徐徐圖治理之是否即請指正西秦艽木瓜炒白芍淮牛膝炒歸身血丹參澤瀉生米仁生甘草白蘚皮赤苓痔血案大腸濕火熾盛內痔頻發穿於肛外不收墜腫作痛大便硬秘汗水淋漓系線之法尤恐痛楚難忍即宜兩相互濟庶可漸瘳雅川連四分槐米三錢火麻仁二錢煨枳殼一錢炒秦艽三錢郁李仁三錢條芩一錢半福瀉二錢皂角子四粒片檳榔一錢半歸尾二錢生甘草四錢生軍三錢漏蹄風案漏蹄風由風濕下注氣血稽留筋脈失榮而致迄今一載之久依然反復不已口僵孔深有妨步履症源彌深難許脫體拙擬方以為蝦力行舟之助耳炒歸身五加皮焦於術木瓜炒白芍細生地海風藤赤苓懷牛膝西秦艽陳皮雞血藤脹痛案症起先咳後脹由肺及脾脾主運化脾病則消磨失職飲聚於中土虛不能安木肝木乘隙而侮中氣欠和是以腸鳴作瀉脹痛交加顯系肝脾不和之故想肝脾為仇讎之藏風木主令客氣少陽厥陰少陽同司相火相火擾動內引濁飲上升營衛留止厥氣逆上真邪相攻此脹痛所由來也現下常咯濁飲脹痛仍不能和甚則痛引腰間下連少腹腎亦未免暗傷非但脾土失調肝腎亦為同病經云肝脹者脅下滯而痛引少腹腎脹者腹滿引背央央然腰骱作痛症形與經文相符診脈細弦而近數舌苔薄而根帶膩白此脈之數乃系相火擾動作邪熱之相干恐其木旺無制上犯陽明有嘔逆胃呆之虞拙擬溫脾腎佐以平肝非敢過投燥熱反動其陽耳附方候高明裁之猺桂心江西術淡吳萸雲苓淡乾薑東白芍煨肉果白毛皮茯神金鈴子來復丹補骨脂花龍骨半夏陽春砂伏暑案夏暑伏中秋涼束表暑為陽邪而其中又挾陰濕蘊久勢必蒸熱所謂六淫之邪皆叢火化也是以初起畏寒繼即發熱昏煩不臥脘悶口乾此舊濕挾新涼交蒸氤氳於氣分胸中之清氣被蒙雖得屢進宣解而汗出不暢白㾦隱而不明甚則讝語躁擾便結脈沉此由氣分之邪不得從汗而解勢必致蘊結於中症頗棘手拙擬外解內清表裡兩治預防痙閉一端附方侯政羚羊角鮮蘆根竹捲心木通連翹心紫雪丹益元散辰茯神陳金汁鮮石斛川雅連京川貝焦山梔暑濕傷寒案質本陰虛營分少以充養體偏陽旺相火未得安寧夏令炎炎正值暑邪用事熱蒸勃勃何堪炎帝加威暑或挾風因風而熏蒸轉速暑必挾濕因濕而宣解殊難真陰既少內涵時氣未免外感先傷肺胃之地漸入營衛之間身熱口渴少火悉成壯火神昏肢痙心陽擾動肝陽白㾦明而紅疹續現由氣分漸入營陰舌苔燥而脈象甚弦損胃津亦傷腎液夜不安寐坎離無以既濟胸時潮悶營衛尚有餘邪咳痰紅而氣逆金受火刑齒垢黑而便難火炎土燥陰虛陽亢一陰何以滋榮邪盛正傷一症將安固守症形危篤防有內閉外脫之慮治必探源庶幾奪命斬關之兆淺見如是尊意若何紫雪丹丹皮鮮石斛鮮生地青蒿露陳金汁元參麥冬鉤鉤銀花露暹犀尖川貝西洋參竹心下痢赤白案高年冬令下痢赤白稀艱軒岐稱曰滯下明是內傷不足之候而不知不足中有餘濕也前診脈左弦右澀舌厚膩中灰肢倦少寐溲澀胃呆考厥源委半由於積勞損於前肝脾不和是病之本半由於濕邪困於內消磨失職是病之標經云中氣虛則溲便為之變又云胃不和則寤不安即此之渭也擬用香砂枳殼佐以和胃平肝標本兼顧曾得便下燥矢數粒小溲為之通利大便為之調和飲食知味舌中灰膩較除一症而見此數善誠為佳徵但肝脾為讎之臟又脾胃為表裡之腑診脈弦象較和而帶虛數納食不當寤寐不安耳鳴肚痛此脾胃陽氣不足肝腎相火不沖有餘未盡之濕尚留於腸胃曲折之間現今冬為藏陽之令少陽相火在泉乃陽氣既受其困而真陰又屬不足若因脾胃柔臟過用剛藥竊恐土燥木虛有由脾及腎之慮譬如劍關固守而陰平非漢有也轉展無可借箸勉擬和胃扶脾調補肝腎俾中陽動則冀運相火靜可望藏王道無近功宜撫安以緩圖其效附方以備採擇制於術一錢半抱茯神三錢米仁四錢炒柏子仁霜四錢淮山藥三錢熟地砂仁炒四錢制玉竹三錢蓮子三錢清炙草二錢陳皮鹽水炒一錢半採芸曲二錢半夏一錢半帶子青蒿二錢遺精案體素三陰不足濕蘊未清相火未能靜熄濕因火而上升熏蒸化毒致頭面疊起濕毒如蔓纏擾一時難以宣解奈因猛藥強絕遏其外泄之機蘊而難化想濕為黏膩之邪其性下流乘下虛而注於肝腎遂致少腹作脹溲澀欠調變成淋濁繼而遺精蓋淋在濁竅遺在精竅濁竅不開則精竅為之不固矣是以症見如此自前秋至今春精濁混來如漏卮之無底現診脈沉弦未甚虛弱舌尚膩而未清小溲時赤赤則精遺轉甚寐多夢擾精力日衰的系漏泄多月有形精血受損無形神智欠安以脈論症由外而至於內由實而挾於虛圖治最難洽當將以填精固本乎而滋膩猶恐礙邪將以利濕去邪乎而淡滲又慮傷正必得竟委窮源兩無妨礙慎弗任朝章言熱暮李論寒補泄雜投致有藥傷之患夫精之藏制在腎而精之主宰則在心乃既精泄已久陰失固守陽少潛藏水虧不能濟火經云君火一動相火隨之又云陰虛者火自旺君相二火兼升定然余濕內蒸搖精而泄也欲強止焉恐不能也據愚見寧心堅腎育陰潛陽仿金匱八味主治再得怡情靜養勿勞神智庶望安瀾錄方候高明裁正為是根生地鹽水炒柏子仁霜淮山藥車前子知母懷牛膝鹽水炒抱木茯神粉丹皮甘草梢焦黃柏淡秋石胡連福澤瀉吐血案咯血屢發甚於春分顯系陰失固守陽失潛藏當春厥陰司令客氣又屬少陽厥陰少陽同司相火二火升騰辛金未免受克此咯血所由成也但診脈細弦右寸關獨見弦大舌邊尖色絳中苔膩黃面色滯而不開右胸時覺脹悶知飢納食不調此肝腎之真陰不足而肺胃之痰熱未清虛在下而實在上圖治甚難古人謂二虛一實先治其實因去邪即所以扶正也據愚見清理肺胃主治俾養金即所以制木和土即所以安木火不妄動而血自安寧何患紅痰之不止哉雖然病經一載翻覆再三有形之精血受傷藥餌恐難奏效耳附方候高明裁之霍山石斛北沙參瓜蔞仁川貝冰糖石膏黛蛤散辰茯神竹葉鮮青菊花紫石英冬桑葉橘紅元水炒鮮枇杷葉馬兜鈴甜杏仁案肝腎之陰素虧脾胃之痰素盛病自秋徂冬屈指已越三月形寒形熱乍往乍來陰陽交錯營衛交亂正氣如何維持津液如何敷布君火熾旺相火熾動神為不寧魂為不藏加以觸受驚恐遂使神志混淆寐不安穩錯語喃喃手有振動肢末掣掣肝膽之風陽走入經絡脾胃之濕痰擾及清靈左手脈弦細而勁右手脈數細而滑舌尖燥絳舌中乾白風勝則津干熱勝則液涸肺失清肅胃失濡養現在幸無汗泄陰陽尚有樞紐轉瞬冬至大節恐有一番劇烈治法甘涼承津養液參用介類潛陽育陰法大生地四錢青龍齒四錢左牡蠣六錢抱茯神三錢川貝母二錢莧麥冬二錢西洋參一錢橘紅五錢陳膽星一錢淡甘草四分真濂珠研另吞一分真金箔三張臨服入霍山石斛湯送藥
